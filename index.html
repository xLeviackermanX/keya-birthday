<html>

<head>
    <title>Happy Birthday</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="loader">
                <button id="play">Start</button>
            </div>
        </div>
    </div>
    <audio class="song" controls loop>
        <source src="music.mp3">
        </source>
        Your browser isn't invited for super fun audio time.
    </audio>
    <canvas id="confetti"></canvas>
    <div class="main">
        <div class="container pt-5">
            <div class="row">

                <div class="col-12 col-xl-6 mx-auto">
                    <img src="img/banner.png" alt="">
                </div>

                <div class="col-12  text-center">
                    <div id="name" class="area">Keya</div>
                </div>

                <div class="col-12 text-center">
                    <div class="type-wrap">
                        <div id="typed-strings" class="typing">
                            <h2>Happy Birthday <i id="nae">Keya</i></h2>
                            <h2>Have a wonderful day</h2>
                            <h2>Filled with joy and happiness.</h2>
                        </div>
                        <span id="typed" style="white-space:pre;"></span>
                    </div>
                </div>

                <div class="col-12 col-xl-3 cake">
                    <img src="img/cake.gif" alt="">
                </div>
            </div>
        </div>
        <img src="img/Balloon-Border.png" width="100%" class="balloon-border">
        <button id="to-transition" class="nav-btn cake-next">Next</button>
    </div>

    <!-- Transition screen -->
    <div id="transition-screen" class="screen">
        <div class="screen-inner">
            <h1 class="transition-text">Get ready to read some old bad one-liners 😅</h1>
            <button id="to-gallery" class="nav-btn">Let's go</button>
        </div>
    </div>

    <!-- Image gallery screen -->
    <div id="gallery-screen" class="screen">
        <div class="screen-inner">
            <div class="gallery-frame">
                <img id="gallery-img" src="images/keya01.png" alt="">
            </div>
            <div class="gallery-counter"><span id="gallery-index">1</span> / <span id="gallery-total">14</span></div>
            <div class="gallery-controls">
                <button id="gallery-prev" class="nav-btn">Previous</button>
                <button id="gallery-next" class="nav-btn">Next</button>
            </div>
        </div>
    </div>

    <!-- Birthday letter screen -->
    <div id="letter-screen" class="screen">
        <div class="letter-card">
            <h1 class="letter-title">A Letter For You 💌</h1>
            <div class="letter-body" id="letter-body">
                <p>Dear Keya,</p>
                <p>[ Your letter goes here — we'll fill this in later. ]</p>
                <p>With all my love,<br>Me</p>
            </div>
            <button id="letter-back" class="nav-btn">Back to photos</button>
        </div>
    </div>
</body>
<script src="https://unpkg.com/magic-snowflakes/dist/snowflakes.min.js"></script>
<script src="js/jquery.js"></script>
<script src="js/typed.min.js"></script>
<script src="js/script.js"></script>

</html>
